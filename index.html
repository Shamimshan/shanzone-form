<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shan Zone | Service Application Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--primary:#0b3c78;
--accent:#ff7a00;
--dark:#071222;
--bg:#eef2f7;

--lite:#2ecc71;
--pro:#3498db;
--boost:#e67e22;

}

/* GLOBAL */

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,#071222,#0b3c78);

padding:40px 20px;

display:none;

}

/* CONTAINER */

.form-luxury-container{

max-width:900px;

margin:auto;

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:
0 20px 60px rgba(0,0,0,0.35);

}

/* HEADER */

.form-header-row{

display:flex;
justify-content:space-between;
align-items:center;

padding:25px;

background:
linear-gradient(120deg,#0b3c78,#041d40);

color:white;

}

.form-header-row img{
height:60px;
}

.form-header-row h2{

margin:0;
font-size:24px;
letter-spacing:1px;

}

/* COMPANY INFO */

.company-info p{

margin:2px 0;
font-size:11px;
opacity:.9;

}

/* PHOTO BOX */

.form-photo-upload-box{

text-align:center;

}

.photo-frame{

width:115px;
height:140px;

border-radius:10px;

background:white;

border:2px dashed rgba(255,255,255,0.5);

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

color:#999;

}

.btn-change-photo{

margin-top:6px;

background:var(--accent);

color:white;

border:none;

padding:6px 10px;

border-radius:6px;

font-size:11px;

cursor:pointer;

}

/* SEARCH BAR */

.no-print{

background:#f8fafc;

padding:14px;

text-align:center;

border-bottom:1px solid #e6eaf0;

}

.no-print input{

padding:8px;

border-radius:6px;

border:1px solid #ccd4df;

}

.no-print button{

padding:8px 16px;

background:var(--primary);

color:white;

border:none;

border-radius:6px;

cursor:pointer;

}

/* FORM BODY */

form{

padding:25px;

}

/* GRID */

.data-row{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-bottom:12px;

}

/* INPUT */

.input-item label{

font-size:12px;

font-weight:600;

color:#333;

}

.input-item input,
.input-item select{

width:100%;

padding:9px;

border-radius:6px;

border:1px solid #d4dce6;

background:#f7f9fc;

font-size:13px;

transition:0.3s;

}

.input-item input:focus,
.input-item select:focus{

border-color:var(--primary);

background:white;

outline:none;

}

/* SECTION TITLE */

.form-section-title{

margin:25px 0 10px;

padding:9px 15px;

background:
linear-gradient(90deg,#0b3c78,#123d7a);

color:white;

font-size:13px;

border-radius:6px;

font-weight:600;

}

/* CONNECTION TYPE */

.kyc-section{

display:flex;

gap:20px;

padding:12px;

background:#f4f7fc;

border-radius:6px;

margin-bottom:12px;

}

.kyc-item{

font-size:13px;
font-weight:600;

}

/* PLAN BADGES */

.plan-badge{

padding:3px 8px;

border-radius:4px;

color:white;

font-size:10px;

margin-left:6px;

}

.lite{background:var(--lite);}
.pro{background:var(--pro);}
.boost{background:var(--boost);}

/* TERMS */

.terms-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:25px;

}

.terms-column{

font-size:11px;

line-height:1.5;

text-align:justify;

}

.terms-column .head{

color:var(--primary);
font-weight:700;
margin-bottom:6px;

}

/* DECLARATION */

.declaration-section{

background:#fff7e6;

padding:12px;

border-radius:8px;

border:1px solid #ffd58a;

}

/* SIGN */

.footer-sigs{

display:flex;

justify-content:space-between;

margin-top:35px;

}

.sig-box{

border-top:1px solid black;

width:220px;

text-align:center;

padding-top:6px;

font-size:12px;

font-weight:600;

}

/* BUTTONS */

.action-btns{

text-align:center;

margin-top:30px;

}

.btn-p{

border:none;

padding:12px 25px;

border-radius:8px;

font-weight:600;

margin:0 6px;

color:white;

cursor:pointer;

transition:0.3s;

}

.btn-p:hover{

transform:translateY(-2px);

box-shadow:0 5px 18px rgba(0,0,0,.2);

}

.print{background:#2ecc71;}
.reset{background:#e74c3c;}
.save{background:#0b3c78;}
.update{background:#ff7a00;}

/* MOBILE */

@media(max-width:768px){

.data-row{

grid-template-columns:1fr;

}

.form-header-row{

flex-direction:column;
gap:15px;
text-align:center;

}

}

/* PRINT */

@media print{

body{
background:white;
display:block !important;
padding:0;
}

.form-luxury-container{

box-shadow:none;
border-radius:0;

}

.no-print,
.btn-change-photo,
.action-btns{

display:none !important;

}

}

</style>

</head>
