<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Zone | Service Application Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0047ab; --accent: #ff5e14; --dark: #0a1128; --light: #f4f7fa;
        }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; background-color: #eef2f7; display: none; }
        .form-luxury-container { background: #fff; max-width: 850px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .form-header-row { display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .form-section-title { background: var(--primary); color: white; padding: 6px 15px; font-weight: bold; margin: 15px 0 8px; border-radius: 5px; font-size: 14px; }
        .data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .input-item label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 2px; }
        .input-item input, .input-item select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; height: 32px; box-sizing: border-box; }
        .form-photo-upload-box { width: 110px; text-align: center; }
        .photo-frame { width: 100px; height: 130px; border: 2px dashed #999; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .btn-p { padding: 10px 25px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; margin: 0 10px; color: #fff; }
        .btn-p.save { background: #0047ab; } .btn-p.update { background: #ff5e14; } .btn-p.print { background: #27ae60; } .btn-p.reset { background: #e74c3c; }
        .no-print { text-align: center; margin-bottom: 20px; background: #f0f0f0; padding: 15px; border-radius: 10px; }
        @media print { .action-btns, .no-print, .btn-change-photo { display: none !important; } body { display: block !important; } .form-luxury-container { box-shadow: none; border: none; } }
    </style>
</head>
<body>

    <div class="form-luxury-container">
        <div class="no-print">
            <b>पुरानी आईडी सर्च करें: </b>
            <input type="text" id="searchIdBox" placeholder="Customer ID..." style="padding: 6px; width: 150px;">
            <button type="button" class="btn-p save" style="padding: 6px 15px;" onclick="_srh()">Search</button>
        </div>

        <div class="form-header-row">
            <div>
                <img src="logo.jpg" style="height:50px;">
                <p style="font-size: 11px; margin:0;"><b>Address:</b> Malmaliya Urf Sirsia, Partawal</p>
                <p style="font-size: 11px; margin:0;"><b>GSTIN:</b> 09ENXPS9608J1ZQ</p>
            </div>
            <div style="text-align:center;">
                <h2 style="margin:0; color:var(--primary);">Customer Service Form</h2>
                <p style="margin:2px 0; font-weight: bold; color: #e74c3c;">App No: <span id="appNo">---</span></p>
            </div>
            <div class="form-photo-upload-box">
                <div class="photo-frame" id="photoFrame">PHOTO</div>
                <input type="file" id="photoInput" hidden onchange="_pre(this)">
                <button type="button" style="font-size:10px; margin-top:5px;" onclick="document.getElementById('photoInput').click()">Change</button>
            </div>
        </div>

        <form id="mainServiceForm">
            <input type="hidden" name="row" id="rowIdx">
            <input type="hidden" name="action" id="formAction" value="save">
            
            <div class="data-row">
                <div class="input-item">
                    <label>तारीख (Date):</label>
                    <input type="text" name="date" id="formattedDate" readonly onclick="document.getElementById('datePicker').showPicker()">
                    <input type="date" id="datePicker" style="display:none;" onchange="_updD(this)">
                </div>
                <div class="input-item"><label>कस्टमर आईडी (ID):</label><input type="text" name="id" id="custId"></div>
            </div>

            <div class="form-section-title">1. ग्राहक का विवरण (Customer Details)</div>
            <div class="data-row">
                <div class="input-item"><label>नाम:</label><input type="text" name="name" id="custName"></div>
                <div class="input-item"><label>पिता का नाम:</label><input type="text" name="father" id="custFather"></div>
                <div class="input-item"><label>मोबाइल:</label><input type="tel" name="phone" id="custPhone"></div>
                <div class="input-item"><label>ईमेल:</label><input type="email" name="email" id="custEmail"></div>
                <div class="input-item" style="grid-column: span 2;"><label>पता:</label><input type="text" name="address" id="custAddress"></div>
            </div>

            <div class="form-section-title">2. प्लान विवरण (Plan Details)</div>
            <div class="data-row">
                <div class="input-item">
                    <label>प्लान चुनें:</label>
                    <select id="planSelector" name="plan" onchange="_auto()">
                        <option value="">--Select--</option>
                        <option value="LITE">LITE (30Mbps)</option>
                        <option value="PRO">PRO (50Mbps)</option>
                        <option value="BOOST">BOOST (100Mbps)</option>
                    </select>
                </div>
                <div class="input-item"><label>स्पीड:</label><input type="text" name="speed" id="speedDisplay" readonly></div>
                <div class="input-item"><label>शुल्क: ₹</label><input type="number" name="price" id="priceDisplay" readonly></div>
                <div class="input-item"><label>Installation: ₹</label><input type="number" name="install" id="custInstall"></div>
                <div class="input-item"><label>MAC Address:</label><input type="text" name="mac" id="custMac"></div>
                <div class="input-item"><label>Comment:</label><input type="text" name="remarks" id="custRemarks"></div>
            </div>

            <div style="margin-top:15px;"><label><input type="checkbox" id="agreeCheck"> मैं सहमत हूँ।</label></div>

            <div class="action-btns">
                <button type="button" class="btn-p reset" onclick="_res()">Reset</button>
                <button type="button" class="btn-p save" onclick="_sub('save')">Save</button>
                <button type="button" class="btn-p update" onclick="_sub('update')">Update</button>
                <button type="button" class="btn-p print" onclick="_prt()">Print</button>
            </div>
        </form>
    </div>

    <script>
        // Obfuscated config: [Pass, AdminKey, display, block, SZ-, URL]
        const _0x1f2 = ['shan123','shan_secure_786','display','block','SZ-','https://script.google.com/macros/s/AKfycbxH_MF4_EsiPTMPIBqUM-btc9eoq9aY2FSBmnRobKhwvkX0R96aAY9xEElWdW43CQE8/exec'];
        
        window.onload = function() {
            if (prompt("Access Password:") === _0x1f2[0]) {
                document.body.style[_0x1f2[2]] = _0x1f2[3];
                if(!document.getElementById('rowIdx').value) _gnA();
                _setD();
            } else { location.reload(); }
        };

        function _gnA() { document.getElementById('appNo').innerText = _0x1f2[4] + Math.floor(1000 + Math.random() * 9000); }

        function _setD() {
            const d = new Date();
            const ms = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            document.getElementById('formattedDate').value = String(d.getDate()).padStart(2,'0') + "-" + ms[d.getMonth()] + "-" + d.getFullYear();
        }

        function _srh() {

                .then(r => r.json()).then(d => {
                    if(d === "Not Found") alert("ID not found!");
                    else {
                        document.getElementById('custId').value = id;
                        document.getElementById('custName').value = d.name;
                        document.getElementById('custFather').value = d.father;
                        document.getElementById('custEmail').value = d.email;
                        document.getElementById('custPhone').value = d.phone;
                        document.getElementById('custAddress').value = d.address;
                        document.getElementById('custInstall').value = d.install || "";
                        document.getElementById('custMac').value = d.mac || "";
                        document.getElementById('custRemarks').value = d.remarks || "";
                        document.getElementById('rowIdx').value = d.row;

        }

        function _auto() {
            const p = document.getElementById('planSelector').value;
            const s = document.getElementById('speedDisplay'), pr = document.getElementById('priceDisplay');
            if(p==="LITE"){ s.value="30 Mbps"; pr.value="599"; }
            else if(p==="PRO"){ s.value="50 Mbps"; pr.value="799"; }
            else if(p==="BOOST"){ s.value="100 Mbps"; pr.value="1150"; }
        }

        function _pre(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){document.getElementById('photoFrame').innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;">';};r.readAsDataURL(i.files[0]);}}
        function _updD(i){const d=new Date(i.value);const m=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];document.getElementById('formattedDate').value=String(d.getDate()).padStart(2,'0')+"-"+m[d.getMonth()]+"-"+d.getFullYear();}
        function _prt(){if(document.getElementById('agreeCheck').checked) window.print(); else alert("Tick Agree!");}
        function _res(){document.getElementById('mainServiceForm').reset(); _gnA();}
    </script>
</body>
</html>
