<style>

:root{
--primary:#0b3c78;
--accent:#ff6b00;
--dark:#071222;
--light:#f4f7fa;
--lite-color:#2ecc71;
--pro-color:#3498db;
--boost-color:#e67e22;
}

/* GLOBAL */

body{
font-family:'Poppins',sans-serif;
margin:0;
padding:30px;
background:linear-gradient(135deg,#071222,#0b3c78);
display:none;
}

/* MAIN CARD */

.form-luxury-container{

background:white;

max-width:880px;

margin:auto;

padding:30px;

border-radius:18px;

box-shadow:
0 20px 60px rgba(0,0,0,.35);

border:none;

}

/* SEARCH */

.no-print{

text-align:center;

margin-bottom:20px;

background:#f4f7fc;

padding:15px;

border-radius:10px;

border:1px solid #e2e6ee;

}

/* HEADER */

.form-header-row{

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:3px solid var(--primary);

padding-bottom:12px;

margin-bottom:18px;

}

/* SECTION TITLE */

.form-section-title{

background:linear-gradient(90deg,#0b3c78,#123d7a);

color:white;

padding:7px 15px;

font-weight:600;

margin:18px 0 10px;

border-radius:6px;

font-size:13px;

letter-spacing:.3px;

}

.form-section-title.center{
text-align:center;
}

/* GRID */

.data-row{

display:grid;

grid-template-columns:1fr 1fr;

gap:16px;

margin-bottom:12px;

}

/* INPUT */

.input-item label{

display:block;

font-size:12px;

font-weight:600;

color:#444;

margin-bottom:3px;

}

.input-item input,
.input-item select{

width:100%;

padding:8px;

border-radius:6px;

border:1px solid #ccd4df;

background:#f8fafc;

font-size:13px;

transition:.25s;

height:34px;

}

.input-item input:focus,
.input-item select:focus{

border-color:var(--primary);

background:white;

outline:none;

box-shadow:0 0 0 2px rgba(11,60,120,.15);

}

/* PHOTO BOX */

.form-photo-upload-box{
text-align:center;
}

.photo-frame{

width:105px;

height:135px;

border-radius:10px;

border:2px dashed #bbb;

display:flex;

align-items:center;

justify-content:center;

background:#fafafa;

overflow:hidden;

}

/* PHOTO BUTTON */

.btn-change-photo{

font-size:11px;

background:var(--accent);

color:#fff;

padding:5px 8px;

border-radius:6px;

border:none;

cursor:pointer;

width:100%;

}

/* CONNECTION TYPE */

.kyc-section{

display:flex;

gap:22px;

padding:10px;

background:#f6f8fd;

border-radius:6px;

border:1px solid #e6ecf5;

align-items:center;

}

.kyc-item{

display:flex;

align-items:center;

font-size:13px;

font-weight:600;

}

.kyc-item input{

margin-right:6px;

width:16px;

height:16px;

}

/* TERMS */

.terms-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:25px;

margin-top:8px;

}

.terms-column{

font-size:11px;

line-height:1.5;

color:#333;

text-align:justify;

}

.terms-column b.head{

display:block;

margin-bottom:6px;

color:var(--primary);

border-bottom:1px solid #e5e5e5;

font-size:12px;

padding-bottom:2px;

}

.terms-column ol{

padding-left:16px;

margin:0;

}

.terms-column ol li{
margin-bottom:4px;
}

/* DECLARATION */

.declaration-section{

margin-top:8px;

font-size:12px;

background:#fff8e1;

padding:12px;

border-radius:6px;

border:1px solid #ffd45a;

}

/* SIGNATURE */

.footer-sigs{

display:flex;

justify-content:space-between;

margin-top:40px;

}

.sig-box{

border-top:1px solid #000;

width:220px;

text-align:center;

padding-top:6px;

font-weight:600;

font-size:12px;

}

.sig-date{

font-size:11px;

font-weight:normal;

margin-top:4px;

color:#666;

}

/* BUTTONS */

.action-btns{

text-align:center;

margin-top:30px;

}

.btn-p{

padding:11px 26px;

font-weight:600;

border-radius:8px;

border:none;

cursor:pointer;

margin:0 8px;

color:#fff;

transition:.3s;

}

.btn-p:hover{

transform:translateY(-2px);

box-shadow:0 6px 18px rgba(0,0,0,.25);

}

.btn-p.print{background:#2ecc71;}
.btn-p.reset{background:#e74c3c;}
.btn-p.save{background:#0b3c78;}
.btn-p.update{background:#ff6b00;}

/* MOBILE */

@media(max-width:768px){

.data-row{
grid-template-columns:1fr;
}

.form-header-row{
flex-direction:column;
gap:15px;
text-align:center;
}

}

/* PRINT */

@media print{

@page{
size:A4;
margin:0;
}

body{
background:white;
display:block !important;
padding:0;
}

.action-btns,
.btn-change-photo,
.no-print{
display:none !important;
}

.form-luxury-container{

max-width:100% !important;

border:none !important;

box-shadow:none !important;

padding:12mm 15mm !important;

}

}

</style>
